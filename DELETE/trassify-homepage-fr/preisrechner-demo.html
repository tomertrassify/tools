/* ====== Toggle Switch (iOS-Style) ====== */
.switch {
  --w: 44px;
  --h: 24px;
  --pad: 3px;
  --on:  #A6C4A1;
  --off: #c7ced9;
  --knob: #fff;
  --ring: 0 0 0 3px rgba(166,196,161,.25);
  display: inline-flex;
  align-items: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.switch input[type="checkbox"] {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
}
.switch .switch__track {
  position: relative;
  display: inline-flex;
  align-items: center;
  width: var(--w);
  height: var(--h);
  border-radius: calc(var(--h) / 2);
  background: var(--off);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.06);
  transition: background-color .2s ease, box-shadow .2s ease;
}
.switch .switch__knob {
  position: absolute;
  top: var(--pad);
  left: var(--pad);
  width: calc(var(--h) - var(--pad) * 2);
  height: calc(var(--h) - var(--pad) * 2);
  background: var(--knob);
  border-radius: 999px;
  box-shadow: 0 1px 2px rgba(0,0,0,.2), 0 0 0 1px rgba(0,0,0,.06);
  transform: translateX(0);
  transition: transform .2s ease;
}
.switch input[type="checkbox"]:checked + .switch__track {
  background: var(--on);
}
.switch input[type="checkbox"]:checked + .switch__track .switch__knob {
  transform: translateX(calc(var(--w) - var(--h)));
}
.switch input[type="checkbox"]:focus-visible + .switch__track {
  box-shadow: var(--ring);
}
@media (prefers-color-scheme: dark) {
  .switch { --off:#3a3f4a; --on:#A6C4A1; --ring:0 0 0 3px rgba(166,196,161,.35); }

  <script>
    document.addEventListener("DOMContentLoaded", function() {
        let cursor = null;
        // Seiten, auf denen der MouseFollower NICHT aktiv sein soll
        const excludedPaths = [
            "/projekt-a661",
        ];
        function initMouseFollower() {
            const currentPath = window.location.pathname;
            // Check: Ist die aktuelle Seite in den Ausnahmen?
            const isExcluded = excludedPaths.includes(currentPath);
            if (window.innerWidth > 1024 && !isExcluded) {
                if (!cursor) {
                    cursor = new MouseFollower();
                }
            } else {
                if (cursor) {
                    cursor.destroy();
                    cursor = null;
                }
            }
        }
        initMouseFollower();
        window.addEventListener('resize', initMouseFollower);
    });

   FORMSPARK + KML HELPERS
========================= */
const FORMSPARK_ID = "1Lihz34qb"; // <— HIER einsetzen!
const FORMSPARK_ENDPOINT = `https://submit-form.com/${FORMSPARK_ID}`;
function escapeXml(s){ return String(s??'').replace(/[<>&'"]/g, c=>({ '<':'&lt;','>':'&gt;','&':'&amp;',"'":'&apos;','"':'&quot;' }[c])); }
function turfPolygonToKML(turfPoly, name="Trassify-Auswahl") {
  if (!turfPoly || turfPoly.type!=='Feature' || turfPoly.geometry?.type!=='Polygon') return '';
  const rings = turfPoly.geometry.coordinates;
  const asStr = ring => ring.map(([lng,lat]) => `${lng},${lat},0`).join(' ');
  const outer = asStr(rings[0]||[]);
  const inners=(rings.slice(1)||[]).map(r=>`<innerBoundaryIs><LinearRing><coordinates>${asStr(r)}</coordinates></LinearRing></innerBoundaryIs>`).join('');
  return `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <name>${escapeXml(name)}</name>
  <Placemark>
    <name>${escapeXml(name)}</name>
    <Polygon>
      <outerBoundaryIs><LinearRing><coordinates>${outer}</coordinates></LinearRing></outerBoundaryIs>
      ${inners}
    </Polygon>
  </Placemark>
</Document>
</kml>`;
}
async function postToFormspark(payload){
  const resp = await fetch(FORMSPARK_ENDPOINT, {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify(payload)
  });
  if(!resp.ok) throw new Error(`Formspark HTTP ${resp.status}`);
  try{ return await resp.json(); }catch{ return {}; }
}

function formatCurrency(n){ return n.toLocaleString(undefined,{style:'currency', currency:'EUR', maximumFractionDigits:0}); }
/* =========================
   PREISLOGIK (advanced)
========================= */
// Small-Area-Booster
function smallAreaFactor(B){
  if (B >= SMALL_AREA_THRESHOLD_M2) return 1;
  const t = Math.pow(1 - B / SMALL_AREA_THRESHOLD_M2, SMALL_AREA_EXP);
  return 1 + SMALL_AREA_BONUS_MAX * t;
}
// Volumenrabatt (nur Core)
function volumeDiscount(B){
  if (B <= VOLUME_DISCOUNT_START_M2) return 1;
  if (B >= VOLUME_DISCOUNT_END_M2)   return VOLUME_DISCOUNT_MIN;
  const t = (B - VOLUME_DISCOUNT_START_M2) / (VOLUME_DISCOUNT_END_M2 - VOLUME_DISCOUNT_START_M2);
  return 1 - t * (1 - VOLUME_DISCOUNT_MIN); // 1.00 → 0.30
}
// Autobahn-Korridor-Erkenner
function isMotorwayCorridor(ctx){
  const r = ctx.roadStats || emptyRoadStats();
  const kmTot = Math.max(1e-6, r.total.km);
  const shareMotor = r.motorways.km / kmTot;
  const shareOther = (r.mainroads.km + r.localroads.km + r.paths.km) / kmTot;
  const buildingShare = ctx.areaBuildingsM2 / Math.max(1, ctx.areaTotalM2);
  return (shareMotor >= 0.60) && (shareOther <= 0.40) && (buildingShare <= 0.15);
}
// Leitungsauskunft (Stückweise + Degression + optionaler Korridor-Abschlag)
function calcLeiCost(B){
  if (B <= LEI_THRESHOLD_M2) return LEI_MIN_FEE_EUR;
  let rate = LEI_RATE_EUR_PER_M2;
  if (B > LEI_DECAY_START_M2) {
    const t = Math.min(1, (B - LEI_DECAY_START_M2) / LEI_DECAY_SPAN_M2);
    rate = LEI_RATE_EUR_PER_M2 + t * (LEI_RATE_EUR_PER_M2_LARGE - LEI_RATE_EUR_PER_M2);
  }
  if (isMotorwayCorridor(last)) rate *= LEI_CORRIDOR_MULT;
  return B * rate;
}
// Hauptfunktion
function calcPriceAuto(B, inferred, surveyYN, leiYN){
  if (!isFinite(B) || B <= 0) return 0;
  // Core vor Vermessung
  const base = B * BASE_RATE_PER_M2 * CONSERVATIVE_DISCOUNT;
  const areaFactorRaw = 1 + AREA_FACTOR_SLOPE * Math.log(Math.max(1, B) / AREA_FACTOR_PIVOT_M2);
  const areaFactor = clamp(areaFactorRaw, AREA_FACTOR_MIN, AREA_FACTOR_MAX);
  const roadFactor = 1 + ROAD_INTENSITY_MULT * calcRoadIntensityScore(last);
  let core = base * areaFactor * roadFactor * smallAreaFactor(B);
  // Core-Mindestpreis
  if (B <= WORK_MIN_THRESHOLD_M2) core = Math.max(core, WORK_MIN_CORE_EUR);
  // Lage- & Volumenrabatte NUR auf den Core
  let coreMult = 1;
  if (inferred?.kind === 'ausser') coreMult *= RURAL_CORE_MULT; // Außerorts
  coreMult *= volumeDiscount(B);                                // Volumenrabatt
  if (isMotorwayCorridor(last)) coreMult *= CORRIDOR_CORE_MULT; // Autobahn-Korridor
  core *= coreMult;
  // Vermessung
  const surveyFactor = (surveyYN === 'Ja') ? SURVEY_FACTOR_YES : SURVEY_FACTOR_NO;
  const work = core * surveyFactor;
  // Leitungsauskunft additiv
  const leiCost = (leiYN === 'Ja') ? calcLeiCost(B) : 0;
  return work + leiCost;
}
function calcRoadIntensityScore(ctx){
  const effKm2 = Math.max(1e-6, ctx.areaEffectiveM2 / 1e6);
  const r = ctx.roadStats || emptyRoadStats();
  const perCat = (cat) => {
    const kmDensity = (r[cat]?.km || 0) / effKm2;
    const cntDensity = (r[cat]?.count || 0) / effKm2;
    const weight = ROAD_CATEGORY_WEIGHTS[cat] || 1;
    return weight * (ROAD_WEIGHT_KM * kmDensity + ROAD_WEIGHT_COUNT * cntDensity);

function inferLage(ctx){
  const eff=Math.max(ctx.areaEffectiveM2,1);
  const buildingShare=ctx.areaBuildingsM2/Math.max(ctx.areaTotalM2,1);
  const s=ctx.roadAreasM2||{motorways:0, mainroads:0, urbanMain:0, localroads:0, paths:0, total:0};
  const shareMain=s.mainroads/eff, shareUrban=s.urbanMain/eff, shareLocal=s.localroads/eff;
  const isUrbanStrong=(shareUrban>0.03)||(buildingShare>0.25&&(shareMain+shareLocal)>0.05);
  const isLocalDominant=shareLocal>0.06&&shareUrban<0.02;
  const isRural=buildingShare<0.08&&shareUrban<0.015&&shareMain<0.03;
  if(isUrbanStrong) return {label:'Hauptstraße (innerstädtisch)', factor:1.3, kind:'urbanMain'};
  if(isLocalDominant) return {label:'Neben-/Seitenstraße', factor:1.15, kind:'neben'};
  if(isRural) return {label:'Außerorts', factor:0.6, kind:'ausser'};
  if(shareMain>0.03) return {label:'Hauptstraße', factor:1.3, kind:'haupt'};

function leafletPolyToTurf(polyLayer){
  const latlngs=polyLayer.getLatLngs()[0];
  const coords=latlngs.map(ll=>[ll.lng,ll.lat]);
  if(coords.length && (coords[0][0]!==coords[coords.length-1][0]||coords[0][1]!==coords[coords.length-1][1])) coords.push(coords[0]);
  return turf.polygon([coords]);
}
async function overpass(query){
  const url="https://overpass-api.de/api/interpreter";
  const resp=await fetch(url,{method:'POST', body:query, headers:{'Content-Type':'text/plain;charset=UTF-8'}});
  if(!resp.ok) throw new Error('Overpass API Fehler: '+resp.status);
  return resp.json();
}
function polyArgFromTurf(turfPoly){ return turfPoly.geometry.coordinates[0].map(c=>`${c[1]} ${c[0]}`).join(' '); }
async function fetchRoadsForPolygon(turfPoly){
  const poly=polyArgFromTurf(turfPoly);
  const query=`[out:json][timeout:35]; way["highway"](poly:"${poly}"); out geom;`;
  return overpass(query);
}
async function fetchAreasForPolygon(turfPoly){
  const poly=polyArgFromTurf(turfPoly);
  const query=`[out:json][timeout:60];
    ( way["building"](poly:"${poly}"); relation["building"]["type"="multipolygon"](poly:"${poly}");
      way["natural"="water"](poly:"${poly}"); way["waterway"="riverbank"](poly:"${poly}"); way["landuse"="reservoir"](poly:"${poly}");
      relation["natural"="water"]["type"="multipolygon"](poly:"${poly}"); relation["waterway"="riverbank"]["type"="multipolygon"](poly:"${poly}");
      relation["landuse"="reservoir"]["type"="multipolygon"](poly:"${poly}"); ); out geom;`;
  return overpass(query);
}
function ringFromGeometry(geom){
  if(!geom||geom.length<3) return null;
  const ring=geom.map(p=>[p.lon,p.lat]); const first=ring[0], last=ring[ring.length-1];
  if(first[0]!==last[0]||first[1]!==last[1]) ring.push([first[0],first[1]]);
  return ring.length>=4?ring:null;
}
function polygonsFromOverpassElement(el){
  const feats=[];
  if(el.type==='way'){ const ring=ringFromGeometry(el.geometry); if(ring) feats.push(turf.polygon([ring],{osm_id:el.id})); }
  else if(el.type==='relation'&&el.members){
    const outers=[], inners=[];
    for(const m of el.members){ if(!m.geometry) continue; const ring=ringFromGeometry(m.geometry); if(!ring) continue; if(m.role==='outer') outers.push(ring); else if(m.role==='inner') inners.push(ring); }
    for(const o of outers) feats.push(turf.polygon([o, ...inners],{osm_id:el.id}));
  }
  return feats;
}
function lengthInside(lineString, turfPoly){
  const boundary=turf.polygonToLine(turfPoly); let pieces;
  try{ pieces=turf.lineSplit(lineString,boundary); } catch{ pieces={type:'FeatureCollection',features:[lineString]}; }
  let km=0;
  for(const seg of pieces.features){
    const len=turf.length(seg,{units:'kilometers'}); if(len===0) continue;
    const mid=turf.along(seg,len/2,{units:'kilometers'});
    if(turf.booleanPointInPolygon(mid,turfPoly)) km+=len;
  }
  return km;
}

// Highway-Typ korrekt ableiten (construction/proposed → Zieltyp)
function effectiveHighway(tags){
  let hw = tags.highway;
  if (hw === 'construction' && tags.construction) hw = tags.construction;
  if (hw === 'proposed'     && tags.proposed)     hw = tags.proposed;
  return hw;
}
function classify(tags){
  const hw = effectiveHighway(tags);
  if(CLASS_MAP.motorways.has(hw)) return 'motorways';
  if(CLASS_MAP.mainroads.has(hw))  return 'mainroads';
  if(CLASS_MAP.localroads.has(hw)) return 'localroads';
  if(CLASS_MAP.paths.has(hw))      return 'paths';
  return null;
}
function emptyRoadStats(){ return {

  last.areaTotalM2=turf.area(turfPoly);
  last.areaBuildingsM2=0; last.areaWaterM2=0; last.areaEffectiveM2=0;
  last.roadStats=emptyRoadStats(); last.roadAreasM2=emptyRoadAreas();
  last.inferred={label:'-', factor:1.0, kind:'neben'};
  try{
    // Flächen
    const areasData=await fetchAreasForPolygon(turfPoly);
    for(const el of (areasData.elements||[])){
      const kind=(el.tags&&el.tags.building)?'building'
               :(el.tags&&(el.tags.natural==='water'||el.tags.waterway==='riverbank'||el.tags.landuse==='reservoir'))?'water':null;
      if(!kind) continue;
      const polys=polygonsFromOverpassElement(el);
      for(const p of polys){
        let inter=null; try{ inter=turf.intersect(p,turfPoly);}catch{}

        const a=turf.area(inter); if(a<=0) continue;
        if(kind==='building') last.areaBuildingsM2+=a; else last.areaWaterM2+=a;
        fillLayer.addData({type:'Feature', geometry:inter.geometry, properties:{kind:kind==='building'?'building':'water'}});
      }
    }
    last.areaEffectiveM2=Math.max(last.areaTotalM2-(last.areaBuildingsM2+last.areaWaterM2),0);
    const buildingShare=last.areaBuildingsM2/Math.max(last.areaTotalM2,1);
    // Straßen
    const roadsData=await fetchRoadsForPolygon(turfPoly);
    const counted={motorways:new Set(), mainroads:new Set(), localroads:new Set(), paths:new Set()};
    for(const el of (roadsData.elements||[])){
      if(el.type!=='way'||!el.tags?.highway||!el.geometry) continue;

      const effHw = effectiveHighway(el.tags);
      const line = turf.lineString(coords,{id:el.id, highway:effHw, name:el.tags.name||''});
      const insideKm = lengthInside(line,turfPoly); if(insideKm<=0) continue;
      roadsLayer.addData({
        type:'Feature',
        geometry:{type:'LineString', coordinates:coords},
        properties:{id:el.id, highway:effHw, name:el.tags.name||''}
      });
      const cls = classify(el.tags); if(!cls) continue;
      last.roadStats[cls].km+=insideKm;
      if(!counted[cls].has(el.id)){ counted[cls].add(el.id); last.roadStats[cls].count++; last.roadStats.total.count++; }
      last.roadStats.total.km+=insideKm;
      const width = CORRIDOR_WIDTH[effHw] ?? CORRIDOR_WIDTH.default;
      const areaM2=insideKm*1000*width;
      last.roadAreasM2[cls]+=areaM2; last.roadAreasM2.total+=areaM2;
      if(isUrbanMain(effHw,buildingShare)){ last.roadStats.urbanMain.km+=insideKm; last.roadAreasM2.urbanMain+=areaM2; }
    }
    for(const k of ['motorways','mainroads','localroads','paths','total']) last.roadStats[k].km=Math.round(last.roadStats[k].km*100)/100;
    last.inferred=inferLage(last);
  }catch(err){
    console.error(err); alert('Fehler bei der Abfrage/Analyse. Details in der Konsole.');
  }finally{
    last.loading=false; statsControl.render();
  }
}
async function analyzePolygon(polyLayer){ const turfPoly=leafletPolyToTurf(polyLayer); return analyzeTurfPolygon(turfPoly); }
map.on(L.Draw.Event.CREATED, e=>{ drawnItems.clearLayers(); drawnItems.addLayer(e.layer); analyzePolygon(e.layer); });
map.on(L.Draw.Event.EDITED, e=>{ let first; e.layers.eachLayer(l=>{ if(!first) first=l; }); if(first) analyzePolygon(first); });
map.on(L.Draw.Event.DELETED, ()=>{ roadsLayer.clearLayers(); fillLayer.clearLayers();
  last.areaTotalM2=0; last.areaBuildingsM2=0; last.areaWaterM2=0; last.areaEffectiveM2=0;
  last.roadStats=null; last.roadAreasM2=null; last.inferred={label:'-', factor:1.0, kind:'neben'}; last.currentTurfPoly=null; last.loading=false; statsControl.render();
});
// Import
async function handleFiles(fileList){
  const files=Array.from(fileList);
  for(const file of files){
    const name=file.name.toLowerCase();
    try{
      if(name.endsWith('.geojson')||name.endsWith('.json')){ const text=await file.text(); addImportedGeoJSON(JSON.parse(text),name); }
      else if(name.endsWith('.kml')||name.endsWith('.gpx')){ const text=await file.text(); const xml=new DOMParser().parseFromString(text,'text/xml'); const gj=name.endsWith('.kml')?toGeoJSON.kml(xml):toGeoJSON.gpx(xml); addImportedGeoJSON(gj,name); }
      else if(name.endsWith('.zip')){ const arrayBuf=await file.arrayBuffer(); const gj=await shp(arrayBuf); addImportedGeoJSON(gj,name); }
      else if(name.endsWith('.dxf')){ const text=await file.text(); const parser=new DxfParser(); const dxf=parser.parseSync(text); const gj=dxfToGeoJSON(dxf); addImportedGeoJSON(gj,name); }
      else { alert('Nicht unterstützter Dateityp: '+file.name); }
    }catch(e){ console.error('Import-Fehler',file.name,e); alert('Fehler beim Import von '+file.name+' (Details in Konsole).'); }
  }
}
const importedLayer=L.geoJSON(null,{style:f=>({color:'#0ea5e9',weight:2,fillOpacity:0.2})}).addTo(map);
function addImportedGeoJSON(gj,name='import'){
  const fc=normalizeToFeatureCollection(gj); if(!fc.features.length){ alert('Keine Features in '+name+' gefunden.'); return; }
  importedLayer.clearLayers(); importedLayer.addData(fc);
  try{ map.fitBounds(importedLayer.getBounds(),{maxZoom:16}); }catch{}
  const polys=fc.features.filter(f=>['Polygon','MultiPolygon'].includes(f.geometry?.type));
  if(polys.length){
    let biggest=polys[0], maxA=0;
    polys.forEach(f=>{ try{ const a=turf.area(f); if(a>maxA){maxA=a; biggest=f;} }catch{} });
    analyzeTurfPolygon(turf.feature(biggest.geometry));
  }
}
function normalizeToFeatureCollection(geojson){
  if(!geojson) return {type:'FeatureCollection',features:[]};
  if(geojson.type==='FeatureCollection') return geojson;
  if(geojson.type==='Feature') return {type:'FeatureCollection',features:[geojson]};
  if(geojson.type&&geojson.geometry) return {type:'FeatureCollection',features:[geojson]};
  if(Array.isArray(geojson)){ const feats=[]; geojson.forEach(g=>{ const fc=normalizeToFeatureCollection(g); feats.push(...fc.features); }); return {type:'FeatureCollection',features:feats}; }
  return {type:'FeatureCollection',features:[]};
}
function dxfToGeoJSON(dxf){
  const feats=[], ents=dxf.entities||[], pushLine=(coords)=>{ if(coords.length<2) return; feats.push(turf.lineString(coords.map(c=>[c.x,c.y]))); };
  ents.forEach(ent=>{
    if(ent.type==='LINE'){ pushLine([{x:ent.start.x,y:ent.start.y},{x:ent.end.x,y:ent.end.y}]); }
    else if(ent.type==='LWPOLYLINE'||ent.type==='POLYLINE'){ const pts=(ent.vertices||ent.points||[]).map(v=>({x:v.x,y:v.y})); if(pts.length>=2) pushLine(pts); }
  });
  return turf.featureCollection(feats);
}

function ensureInquiryModal(){

  backdrop.innerHTML=`

      <div class="grid">
        <div class="full">

          <input id="inqProject" type="text" placeholder="z.B. A661-Trasse Abschnitt Nord">

        </div>
        <div>
          <label>Firma</label>
          <input id="inqCompany" type="text" placeholder="optional">
        </div>
        <div>
          <label>Ihr Name *</label>
          <input id="inqName" type="text" placeholder="Vor- und Nachname">
          <div id="errName" class="error">Bitte Namen angeben.</div>
        </div>
        <div>
          <label>E-Mail *</label>
          <input id="inqEmail" type="email" placeholder="you@example.com">
          <div id="errEmail" class="error">Bitte gültige E-Mail angeben.</div>
        </div>
        <div>
          <label>Telefon</label>
          <input id="inqPhone" type="tel" placeholder="optional">
        </div>
        <div class="full">
          <label>Nachricht</label>
          <textarea id="inqMsg" placeholder="Hinweise, Besonderheiten…"></textarea>
        </div>
        <div class="full consent-row">
          <input id="inqConsent" type="checkbox">
          <label for="inqConsent">Ich stimme zu, dass meine Daten zur Bearbeitung der Anfrage gemäß Datenschutz verarbeitet werden. *</label>
        </div>
        <div id="errConsent" class="error full">Bitte den Datenschutz bestätigen.</div>
      </div>
      <div class="actions">
        <button id="inqCancel" class="btn-secondary" type="button">Abbrechen</button>
        <button id="inqSend" class="btn-primary" type="button">Jetzt senden</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);

  document.getElementById('inqCancel').addEventListener('click', closeInquiryModal);
  backdrop.addEventListener('click', (e)=>{ if(e.target===backdrop) closeInquiryModal(); });

}
function openInquiryModal(){
  const b=document.getElementById('inquiryModalBackdrop');
  if(!b){ ensureInquiryModal(); }
  document.getElementById('inquiryModalBackdrop').style.display='flex';
}
function closeInquiryModal(){
  const b=document.getElementById('inquiryModalBackdrop');
  if(b) b.style.display='none';
}
function validateEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e||'').trim()); }
async function submitInquiry(){
  const btn=document.getElementById('inqSend');
  const project=document.getElementById('inqProject').value.trim();
  const company=document.getElementById('inqCompany').value.trim();
  const name=document.getElementById('inqName').value.trim();
  const email=document.getElementById('inqEmail').value.trim();
  const phone=document.getElementById('inqPhone').value.trim();
  const msg=document.getElementById('inqMsg').value.trim();
  const consent=document.getElementById('inqConsent').checked;
  // simple validation
  let ok=true;
  const show=(id,cond)=>{ document.getElementById(id).style.display = cond ? 'block' : 'none'; if(cond) ok=false; };
  show('errProject', project==='');
  show('errName', name==='');
  show('errEmail', !validateEmail(email));
  show('errConsent', !consent);
  if(!ok) return;
  try{
    btn.disabled=true; btn.textContent='Sende …';
    const ctx=last;
    const price=calcPriceAuto(ctx.areaEffectiveM2, ctx.inferred, ctx.vermessung, ctx.leiauskunft);
    const poly = ctx.currentTurfPoly || null;
    const nowIso = new Date().toISOString();
    let kmlInline = null;
    if(poly){ kmlInline = turfPolygonToKML(poly, project || `Projekt ${nowIso}`); }
    const payload = {
      _email: {
        subject: `Neue Preis-Anfrage: ${project || 'ohne Projektnamen'}`
      },
      Erstellt_am: nowIso,
      Firma: company,
      Projekt: project,
      Name: name,
      E_Mail: email,
      Telefon: phone,
      Nachricht: msg,
      consent: consent ? 'ja' : 'nein',
      Vermessung: ctx.vermessung,
      Leitungsauskunft: ctx.leiauskunft,
      lage: ctx.inferred?.label || '-',
      Gesamtfläche: Math.round(ctx.areaTotalM2),
      Gebäudefläche: Math.round(ctx.areaBuildingsM2),
      Wasserfläche: Math.round(ctx.areaWaterM2),
      Effektivefläche: Math.round(ctx.areaEffectiveM2),
      motorways_km: ctx.roadStats.motorways.km,
      motorways_count: ctx.roadStats.motorways.count,
      mainroads_km: ctx.roadStats.mainroads.km,
      mainroads_count: ctx.roadStats.mainroads.count,
      localroads_km: ctx.roadStats.localroads.km,
      localroads_count: ctx.roadStats.localroads.count,
      paths_km: ctx.roadStats.paths.km,
      paths_count: ctx.roadStats.paths.count,
      total_km: ctx.roadStats.total.km,
      total_count: ctx.roadStats.total.count,
      gesamt_eur: Math.round(price),
      kml_inline: kmlInline
    };
    await postToFormspark(payload);
    btn.textContent='Gesendet ✓';
    setTimeout(()=>{ closeInquiryModal(); btn.disabled=false; btn.textContent='Jetzt senden'; }, 800);
  }catch(err){
    console.error(err);
    alert('Senden fehlgeschlagen. Details in der Konsole.');
    btn.disabled=false; btn.textContent='Jetzt senden';
  }
}
