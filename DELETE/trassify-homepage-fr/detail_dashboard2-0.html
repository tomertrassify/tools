  <script src="https://unpkg.com/mouse-follower@1/dist/mouse-follower.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
        let cursor = null;
        // Seiten, auf denen der MouseFollower NICHT aktiv sein soll
        const excludedPaths = [
            "/projekt-a661",
        ];
        function initMouseFollower() {
            const currentPath = window.location.pathname;
            // Check: Ist die aktuelle Seite in den Ausnahmen?
            const isExcluded = excludedPaths.includes(currentPath);
            if (window.innerWidth > 1024 && !isExcluded) {
                if (!cursor) {
                    cursor = new MouseFollower();
                }
            } else {
                if (cursor) {
                    cursor.destroy();
                    cursor = null;
                }
            }
        }
        initMouseFollower();
        window.addEventListener('resize', initMouseFollower);
    });
</script>
  <script>
document.addEventListener("DOMContentLoaded", function() {
  // 1. Create the Leaflet map
  const map = L.map('map').setView([ -42, 147 ], 7); // Example center: Tasmania
  // 2. Add a basemap (OpenStreetMap tiles)
  const osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  // 3. Add GeoServer WMS (replace URL + layer name!)
  const wmsLayer = L.tileLayer.wms(
    "http://63.177.76.171:8080/geoserver/topp/wms",
    {
      layers: "topp:tasmania_water_bodies",   // <-- your layer
      format: "image/png",
      transparent: true
    }
  ).addTo(map);
  // 4. Optional: Layer control
  L.control.layers({ "OpenStreetMap": osm }, { "Tasmania Roads": wmsLayer }).addTo(map);
});
</script>
