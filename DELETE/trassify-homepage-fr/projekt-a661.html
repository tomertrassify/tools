  <script>
    document.addEventListener("DOMContentLoaded", function() {
        let cursor = null;
        // Seiten, auf denen der MouseFollower NICHT aktiv sein soll
        const excludedPaths = [
            "/projekt-a661",
        ];
        function initMouseFollower() {
            const currentPath = window.location.pathname;
            // Check: Ist die aktuelle Seite in den Ausnahmen?
            const isExcluded = excludedPaths.includes(currentPath);
            if (window.innerWidth > 1024 && !isExcluded) {
                if (!cursor) {
                    cursor = new MouseFollower();
                }
            } else {
                if (cursor) {
                    cursor.destroy();
                    cursor = null;
                }
            }
        }
        initMouseFollower();
        window.addEventListener('resize', initMouseFollower);
    });
</script>
